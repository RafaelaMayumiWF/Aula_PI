<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula CSS - 1</title>
    <link rel="stylesheet" href="style.css">
</head>

<style>
    * {
    font-family: Arial, Helvetica, sans-serif;
}

.card {
    width: 500px;
    height: fit-content;
    background-color: #a7effc;
    border-radius: 10px;
    border: solid 3px rgb(142, 221, 235);
    margin: 20px;
    padding: 20px;
}

.foto {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    padding-bottom: 10px;
}

img {
    width: 100%;
    height: 100%;
    margin-top: 20px;
}

.titulo {
    font-size: 30px;
}

.cor-destaque {
    color: rgb(130, 166, 233);
}

.estilo-fonte {
    font-style: italic;
}

p {
    font-size: 15px;
}
</style>

<body>

    <div class="card ">
        <div class="icone2 border"></div>

        <div class="foto">
			<img src="https://cdn-icons-png.flaticon.com/256/3681/3681928.png" alt="">
		</div>

        <h1 class="titulo">
            Meu nome é: <span  class="estilo-fonte cor-destaque" >Kevin</span>
        </h1>

        <p class="titulo">
            Mensagem: <i class="estilo-fonte cor-destaque" >O que tiver que ser, será.</i>
        </p>
    </div>

</body>

</html>
