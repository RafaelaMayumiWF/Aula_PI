<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula CSS - 1</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <style>
    * {
      font-family: Arial, Helvetica, sans-serif;
    }

    .card {
      width: 500px;
      height: fit-content;
      background-color: aliceblue;
      border-radius: 25px;
      border: solid 8px rgb(167, 201, 233);
      margin: 20px;
      padding: 0 20px;
    }

    .foto {
      width: 100px;
      height: 100px;
      border-radius: 50%;
    }

    img {
      width: 100%;
      height: 100%;
      margin-top: 20px;
    }

    .titulo {
      font-family: monospace;
      font-size: 30px;
    }

    .cor-destaque {
      font-family: monospace;
      color: rgb(58, 157, 214);
    }

    .estilo-fonte {
      font-style: italic;
      font-weight: bold;
    }
  </style>

  <body>
    <div class="card">
      <div class="icone2 border"></div>

      <div class="foto">
        <img
          src="https://cdn-icons-png.flaticon.com/256/3681/3681928.png"
          alt=""
        />
      </div>

      <h1 class="titulo">
        Meu nome é: <span class="titulo cor-destaque">Kevin</span>
      </h1>

      <p class="estilo-fonte">
        Mensagem:
        <span class="estilo-fonte cor-destaque"
          >O que tiver que ser, será.</span
        >
      </p>
    </div>
  </body>
</html>
